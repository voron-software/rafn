name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip publishing steps (build and package only)'
        type: boolean
        default: false

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            rust-target: x86_64-unknown-linux-gnu
            maturin-target: x86_64
            platform: linux-x64
            binary: rafn
            manylinux: auto
          - name: Linux arm64
            os: ubuntu-24.04-arm
            rust-target: aarch64-unknown-linux-gnu
            maturin-target: aarch64
            platform: linux-arm64
            binary: rafn
            manylinux: auto
          - name: macOS x64
            os: macos-latest
            rust-target: x86_64-apple-darwin
            maturin-target: x86_64
            platform: darwin-x64
            binary: rafn
            manylinux: 'off'
          - name: macOS arm64
            os: macos-latest
            rust-target: aarch64-apple-darwin
            maturin-target: aarch64
            platform: darwin-arm64
            binary: rafn
            manylinux: 'off'
          - name: Windows x64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            maturin-target: x64
            platform: win32-x64
            binary: rafn.exe
            manylinux: 'off'

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Build wheel and binary
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.maturin-target }}
          args: --release --out dist
          manylinux: ${{ matrix.manylinux }}

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-${{ matrix.platform }}
          path: dist/*.whl
          if-no-files-found: error

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binary-${{ matrix.platform }}
          path: target/${{ matrix.rust-target }}/release/${{ matrix.binary }}
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 10

    steps:
      - name: Download wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        if: ${{ !inputs.dry_run }}
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          attestations: true
          skip-existing: true

  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binary-*
          path: artifacts

      - name: Read version from cargo metadata
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Stage package
        run: |
          mkdir -p npm/rafn/bin
          for platform in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            cp "artifacts/binary-${platform}/rafn" "npm/rafn/bin/rafn-${platform}"
            chmod +x "npm/rafn/bin/rafn-${platform}"
          done
          cp artifacts/binary-win32-x64/rafn.exe npm/rafn/bin/rafn-win32-x64.exe
          cp LICENSE npm/rafn/
          sed -i 's/"version": ".*"/"version": "'"$RELEASE_VERSION"'"/' npm/rafn/package.json

      - name: Skip if already published
        id: npm-check
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            "https://registry.npmjs.org/%40voron-software%2frafn/${RELEASE_VERSION}")
          if [ "$code" = "200" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: ${{ !inputs.dry_run && steps.npm-check.outputs.skip != 'true' }}
        working-directory: npm/rafn
        run: npm publish --provenance --access public

  publish-crates:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Read version from cargo metadata
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4

      - name: Skip if already published
        id: crates-check
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            "https://crates.io/api/v1/crates/rafn/${RELEASE_VERSION}")
          if [ "$code" = "200" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: ${{ !inputs.dry_run && steps.crates-check.outputs.skip != 'true' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --allow-dirty

  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Read version from cargo metadata
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binary-*
          path: artifacts

      - name: Package assets
        run: |
          mkdir -p release-assets
          cd release-assets

          for platform in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            case "$platform" in
              linux-x64)    rust_target=x86_64-unknown-linux-gnu ;;
              linux-arm64)  rust_target=aarch64-unknown-linux-gnu ;;
              darwin-x64)   rust_target=x86_64-apple-darwin ;;
              darwin-arm64) rust_target=aarch64-apple-darwin ;;
            esac
            cp "../artifacts/binary-${platform}/rafn" rafn
            chmod +x rafn
            tar -czf "rafn-${rust_target}.tar.gz" rafn
            rm rafn
          done

          cp ../artifacts/binary-win32-x64/rafn.exe rafn.exe
          zip -j "rafn-x86_64-pc-windows-msvc.zip" rafn.exe
          rm rafn.exe

          sha256sum *.tar.gz *.zip > "rafn-checksums.txt"

      - name: Publish GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ env.RELEASE_VERSION }}
          files: release-assets/*
          generate_release_notes: true
