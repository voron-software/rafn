name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip publishing steps (build and package only)'
        type: boolean
        default: false

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  version:
    name: Read version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.read.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Read version from cargo metadata
        id: read
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: version
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            rust-target: x86_64-unknown-linux-gnu
            maturin-target: x86_64
            platform: linux-x64
            binary: rafn
            manylinux: auto
          - name: Linux arm64
            os: ubuntu-24.04-arm
            rust-target: aarch64-unknown-linux-gnu
            maturin-target: aarch64
            platform: linux-arm64
            binary: rafn
            manylinux: auto
          - name: macOS x64
            os: macos-latest
            rust-target: x86_64-apple-darwin
            maturin-target: x86_64
            platform: darwin-x64
            binary: rafn
            manylinux: 'off'
          - name: macOS arm64
            os: macos-latest
            rust-target: aarch64-apple-darwin
            maturin-target: aarch64
            platform: darwin-arm64
            binary: rafn
            manylinux: 'off'
          - name: Windows x64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            maturin-target: x64
            platform: win32-x64
            binary: rafn.exe
            manylinux: 'off'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build wheel and binary
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          target: ${{ matrix.maturin-target }}
          args: --release --out dist
          manylinux: ${{ matrix.manylinux }}

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel-${{ matrix.platform }}
          path: dist/*.whl
          if-no-files-found: error

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binary-${{ matrix.platform }}
          path: target/${{ matrix.rust-target }}/release/${{ matrix.binary }}
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 10

    steps:
      - name: Download wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        if: ${{ !inputs.dry_run }}
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1
        with:
          attestations: true
          skip-existing: true

  publish-npm:
    name: Publish to npm
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 15
    env:
      RELEASE_VERSION: ${{ needs.version.outputs.version }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'

      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binary-*
          path: artifacts

      - name: Stage package
        run: |
          mkdir -p npm/rafn/bin
          for platform in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            cp "artifacts/binary-${platform}/rafn" "npm/rafn/bin/rafn-${platform}"
            chmod +x "npm/rafn/bin/rafn-${platform}"
          done
          cp artifacts/binary-win32-x64/rafn.exe npm/rafn/bin/rafn-win32-x64.exe
          cp LICENSE npm/rafn/
          sed -i 's/"version": ".*"/"version": "'"$RELEASE_VERSION"'"/' npm/rafn/package.json

      - name: Skip if already published
        id: npm-check
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            "https://registry.npmjs.org/%40voron-software%2frafn/${RELEASE_VERSION}")
          if [ "$code" = "200" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: ${{ !inputs.dry_run && steps.npm-check.outputs.skip != 'true' }}
        working-directory: npm/rafn
        run: npm publish --provenance --access public

  publish-crates:
    name: Publish to crates.io
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 20
    env:
      RELEASE_VERSION: ${{ needs.version.outputs.version }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Skip if already published
        id: crates-check
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            "https://crates.io/api/v1/crates/rafn/${RELEASE_VERSION}")
          if [ "$code" = "200" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: ${{ !inputs.dry_run && steps.crates-check.outputs.skip != 'true' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --allow-dirty

  github-release:
    name: Create GitHub Release
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15

    steps:
      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binary-*
          path: artifacts

      - name: Package assets
        run: |
          mkdir -p release-assets
          cd release-assets

          for platform in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            case "$platform" in
              linux-x64)    rust_target=x86_64-unknown-linux-gnu ;;
              linux-arm64)  rust_target=aarch64-unknown-linux-gnu ;;
              darwin-x64)   rust_target=x86_64-apple-darwin ;;
              darwin-arm64) rust_target=aarch64-apple-darwin ;;
            esac
            cp "../artifacts/binary-${platform}/rafn" rafn
            chmod +x rafn
            tar -czf "rafn-${rust_target}.tar.gz" rafn
            rm rafn
          done

          cp ../artifacts/binary-win32-x64/rafn.exe rafn.exe
          zip -j "rafn-x86_64-pc-windows-msvc.zip" rafn.exe
          rm rafn.exe

          sha256sum *.tar.gz *.zip > "rafn-checksums.txt"

      - name: Create tag and publish GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: release-assets/*
          generate_release_notes: true

  homebrew:
    name: Update Homebrew tap
    needs: [version, github-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    if: ${{ !inputs.dry_run }}
    env:
      VERSION: ${{ needs.version.outputs.version }}

    steps:
      - name: Download checksums
        run: |
          curl -sfL \
            "https://github.com/voron-software/rafn/releases/download/v${VERSION}/rafn-checksums.txt" \
            -o rafn-checksums.txt

      - name: Parse SHA256s
        id: sha
        run: |
          get_sha() { grep "$1" rafn-checksums.txt | awk '{print $1}'; }
          echo "macos_arm64=$(get_sha rafn-aarch64-apple-darwin.tar.gz)" >> "$GITHUB_OUTPUT"
          echo "macos_x64=$(get_sha rafn-x86_64-apple-darwin.tar.gz)" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(get_sha rafn-aarch64-unknown-linux-gnu.tar.gz)" >> "$GITHUB_OUTPUT"
          echo "linux_x64=$(get_sha rafn-x86_64-unknown-linux-gnu.tar.gz)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: voron-software/homebrew-tap
          token: ${{ secrets.RAFN_RELEASE_TOKEN }}
          path: tap

      - name: Render formula
        env:
          MACOS_ARM64_SHA: ${{ steps.sha.outputs.macos_arm64 }}
          MACOS_X64_SHA: ${{ steps.sha.outputs.macos_x64 }}
          LINUX_ARM64_SHA: ${{ steps.sha.outputs.linux_arm64 }}
          LINUX_X64_SHA: ${{ steps.sha.outputs.linux_x64 }}
        run: |
          cat > tap/Formula/rafn.rb <<RUBY
          class Rafn < Formula
            desc "Lightweight benchmark uploader"
            homepage "https://rafn.dev"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/voron-software/rafn/releases/download/v${VERSION}/rafn-aarch64-apple-darwin.tar.gz"
                sha256 "${MACOS_ARM64_SHA}"
              end
              on_intel do
                url "https://github.com/voron-software/rafn/releases/download/v${VERSION}/rafn-x86_64-apple-darwin.tar.gz"
                sha256 "${MACOS_X64_SHA}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/voron-software/rafn/releases/download/v${VERSION}/rafn-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_ARM64_SHA}"
              end
              on_intel do
                url "https://github.com/voron-software/rafn/releases/download/v${VERSION}/rafn-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${LINUX_X64_SHA}"
              end
            end

            def install
              bin.install "rafn"
            end

            test do
              assert_match "rafn", shell_output("#{bin}/rafn --version")
            end
          end
          RUBY

      - name: Commit and push
        run: |
          cd tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/rafn.rb
          if git diff --staged --quiet; then
            echo "Formula already up to date"
          else
            git commit -m "rafn ${VERSION}"
            git push
          fi

  winget:
    name: Update winget manifest
    needs: [version, github-release]
    runs-on: windows-latest
    permissions:
      contents: read
    timeout-minutes: 15
    if: ${{ !inputs.dry_run }}

    steps:
      - name: Download wingetcreate
        run: Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

      - name: Submit update
        env:
          VERSION: ${{ needs.version.outputs.version }}
          RAFN_RELEASE_TOKEN: ${{ secrets.RAFN_RELEASE_TOKEN }}
        run: |
          .\wingetcreate.exe update VoronSoftware.Rafn `
            --version $env:VERSION `
            --urls "https://github.com/voron-software/rafn/releases/download/v$($env:VERSION)/rafn-x86_64-pc-windows-msvc.zip" `
            --submit --token $env:RAFN_RELEASE_TOKEN
