name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  build-binaries:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            npm-platform: linux-x64
            artifact: rafn
          - name: Linux arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            npm-platform: linux-arm64
            artifact: rafn
          - name: macOS x64
            os: macos-latest
            target: x86_64-apple-darwin
            npm-platform: darwin-x64
            artifact: rafn
          - name: macOS arm64
            os: macos-latest
            target: aarch64-apple-darwin
            npm-platform: darwin-arm64
            artifact: rafn
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            npm-platform: win32-x64
            artifact: rafn.exe

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install aarch64 cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} --package cli

      - name: Upload binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: rafn-${{ matrix.npm-platform }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}
          if-no-files-found: error

  publish-npm:
    name: Publish npm packages
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: rafn-*
          path: artifacts

      - name: Extract version from tag
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Stage binaries into package
        run: |
          mkdir -p npm/rafn/bin
          for platform in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            cp "artifacts/rafn-${platform}/rafn" "npm/rafn/bin/rafn-${platform}"
            chmod +x "npm/rafn/bin/rafn-${platform}"
          done
          cp "artifacts/rafn-win32-x64/rafn.exe" "npm/rafn/bin/rafn-win32-x64.exe"
          cp LICENSE npm/rafn/LICENSE

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version --prefix npm/rafn
          npm publish npm/rafn --access public

  build-wheels:
    name: Build Python wheels (${{ matrix.os }} ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-24.04-arm
            target: aarch64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x86_64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build wheels
        uses: PyO3/maturin-action@86b9d133d34bc1b40018696f782949dac11bd380 # v1.49.4
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for OIDC trusted publisher
    timeout-minutes: 10

    steps:
      - name: Download wheels
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      # Requires a PyPI Trusted Publisher configured at pypi.org:
      #   Repository owner: voron-software
      #   Repository name:  rafn
      #   Workflow filename: release.yml
      #   Environment name: (leave blank)
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
