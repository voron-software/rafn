syntax = "proto3";

package perfscope.v1;

// Toolset that produced the benchmark results.
enum Toolset {
  TOOLSET_UNSPECIFIED = 0;
  TOOLSET_CRITERION = 1;
  TOOLSET_JMH = 2;
  TOOLSET_GOOGLE_BENCHMARK = 3;
  TOOLSET_BENCHMARKDOTNET = 4;
}

// Programming language of the benchmarked code.
enum Language {
  LANGUAGE_UNSPECIFIED = 0;
  LANGUAGE_RUST = 1;
  LANGUAGE_JAVA = 2;
  LANGUAGE_CPP = 3;
  LANGUAGE_CSHARP = 4;
}

// Core performance metrics, all time fields in nanoseconds.
message Metrics {
  double mean_ns = 1;
  double median_ns = 2;
  double stddev_ns = 3;
  double min_ns = 4;
  double max_ns = 5;
  uint64 iterations = 6;
  double ops_per_sec = 7;
}

// A single benchmark result record.
message Benchmark {
  // Tenant and primary key fields.
  string tenant_id = 1;
  string repository = 2;
  string commit_sha = 3;
  string benchmark_name = 4;
  // Milliseconds since Unix epoch (UTC).
  int64 timestamp_ms = 5;

  // Metadata.
  Toolset toolset = 6;
  Language language = 7;
  optional string branch = 8;
  optional string tag = 9;
  optional string ci_job_id = 10;

  // Core metrics.
  Metrics metrics = 11;

  // Dynamic metrics and labels.
  map<string, double> custom_metrics = 12;
  map<string, string> labels = 13;

  // Environment info.
  optional string cpu_model = 14;
  optional string os = 15;

  // Raw benchmark output for traceability.
  optional string raw_json = 16;
}
