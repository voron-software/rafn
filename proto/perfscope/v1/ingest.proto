syntax = "proto3";

package perfscope.v1;

import "perfscope/v1/benchmark.proto";

// Request to ingest a batch of benchmark records.
message IngestRequest {
  repeated Benchmark records = 1;
}

// Response from a successful ingest.
message IngestResponse {
  uint32 benchmarks_ingested = 1;
  string message = 2;
}

// Ingest service for submitting benchmark results.
service IngestService {
  rpc Ingest(IngestRequest) returns (IngestResponse);
}
