name: Run Rafn
description: Install the rafn CLI via taiki-e/install-action and run it.

inputs:
  version:
    description: Crate version to install, such as 0.1.0. Use latest for the newest release.
    required: false
    default: latest
  command:
    description: Rafn subcommand to invoke, such as bench, push, trend, compare, bisect, or config.
    required: false
    default: bench
  args:
    description: Additional arguments passed to the rafn subcommand.
    required: false
    default: ''
  working-directory:
    description: Directory to run the rafn command in, such as a benchmark project within a monorepo.
    required: false
    default: ''

outputs:
  path:
    description: Path to the installed rafn executable.
    value: ${{ steps.resolve.outputs.path }}

runs:
  using: composite
  steps:
    - name: Install rafn
      uses: taiki-e/install-action@5ebac0d9522d786674368e47e92963ba13f2c376 # v2.82.11
      with:
        tool: rafn${{ inputs.version != 'latest' && format('@{0}', inputs.version) || '' }}

    - name: Resolve rafn path
      id: resolve
      shell: bash
      run: echo "path=$(command -v rafn)" >> "${GITHUB_OUTPUT}"

    - name: Run rafn
      shell: bash
      working-directory: ${{ inputs.working-directory || github.workspace }}
      env:
        RAFN_PATH: ${{ steps.resolve.outputs.path }}
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_ARGS: ${{ inputs.args }}
      run: |
        set -euo pipefail
        set -f
        # shellcheck disable=SC2206
        args=(${INPUT_ARGS})
        set +f
        "${RAFN_PATH}" "${INPUT_COMMAND}" "${args[@]}"
